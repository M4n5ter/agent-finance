name: publish-npm

on:
  workflow_dispatch:

jobs:
  build-platform:
    name: build ${{ matrix.package }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: agent-finance-cli-linux-x64
            os: linux
            cpu: x64
            runner: ubuntu-latest
            binary: target/release/agent-finance
          - package: agent-finance-cli-linux-arm64
            os: linux
            cpu: arm64
            runner: ubuntu-24.04-arm
            binary: target/release/agent-finance
          - package: agent-finance-cli-darwin-x64
            os: darwin
            cpu: x64
            runner: macos-15-intel
            binary: target/release/agent-finance
          - package: agent-finance-cli-darwin-arm64
            os: darwin
            cpu: arm64
            runner: macos-latest
            binary: target/release/agent-finance
          - package: agent-finance-cli-win32-x64
            os: win32
            cpu: x64
            runner: windows-latest
            binary: target/release/agent-finance.exe
    runs-on: ${{ matrix.runner }}
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
      - run: cargo build --release --locked
      - run: cargo test --locked
      - run: node npm/check-binary-links.js ${{ matrix.binary }}
      - run: >
          node npm/create-platform-package.js
          --package ${{ matrix.package }}
          --os ${{ matrix.os }}
          --cpu ${{ matrix.cpu }}
          --binary ${{ matrix.binary }}
          --out npm-dist/${{ matrix.package }}
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.package }}
          path: npm-dist/${{ matrix.package }}
          if-no-files-found: error

  publish:
    name: publish npm packages
    needs: build-platform
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v8.0.1
        with:
          path: npm-dist
      - name: restore executable permissions
        run: find npm-dist -path '*/bin/*' -type f -exec chmod 755 {} +
      - run: npm run check:npm
      - name: publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          package_exists() {
            npm view "$1@$2" version >/dev/null 2>&1
          }
          version="$(node -p 'require("./package.json").version')"
          find npm-dist -name package.json -mindepth 2 -maxdepth 3 -print0 \
            | sort -z \
            | while IFS= read -r -d '' package_json; do
            package_dir="$(dirname "$package_json")"
            package_name="$(node -p "require('$PWD/$package_json').name")"
            if package_exists "$package_name" "$version"; then
              echo "$package_name@$version already exists; skipping"
              continue
            fi
            npm publish "$PWD/$package_dir" --access public
          done
      - name: publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          package_name="$(node -p 'require("./package.json").name')"
          version="$(node -p 'require("./package.json").version')"
          if npm view "$package_name@$version" version >/dev/null 2>&1; then
            echo "$package_name@$version already exists; skipping"
            exit 0
          fi
          npm publish --access public --ignore-scripts
